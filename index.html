<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>US Life Expectancy Map with Graticules</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<style>
  body { font-family: Arial; margin:0; background: #f7f7f7; }
  h1 { text-align:center; margin: 20px 0; color:#333; }
  svg { display:block; margin:auto; }

  .state { stroke:#fff; stroke-width:1; }
  .gratLines { fill:none; stroke:#999; stroke-width:0.5; stroke-opacity:0.3; }
  .gratBackground { fill:none; stroke:#999; stroke-width:1; stroke-opacity:0.1; }

  .tooltip {
    position:absolute; background: rgba(0,0,0,0.7);
    color:#fff; padding:5px 10px; border-radius:4px;
    pointer-events:none; font-size:12px; display:none;
  }

  .legend { font-size:12px; }
  .legend rect { stroke:#ccc; stroke-width:1; }
</style>
</head>
<body>

<h1>Life Expectancy by State (USA)</h1>
<div class="tooltip"></div>
<svg></svg>

<script>
const margin = {top:20, right:20, bottom:50, left:20};
const width = 960 - margin.left - margin.right;
const height = 600 - margin.top - margin.bottom;

const svg = d3.select("svg")
              .attr("width", width + margin.left + margin.right)
              .attr("height", height + margin.top + margin.bottom)
            .append("g")
              .attr("transform", `translate(${margin.left},${margin.top})`);

const tooltip = d3.select(".tooltip");

const projection = d3.geoAlbersUsa()
                     .translate([width/2, height/2])
                     .scale(1000);

const path = d3.geoPath().projection(projection);

Promise.all([
  d3.csv("data/life_expectancy.csv"),
  d3.json("data/us-states.topojson")
]).then(([csvData, usTopo]) => {

  const states = topojson.feature(usTopo, usTopo.objects["us-states"]).features;

  const dataMap = {};
  csvData.forEach(d => { dataMap[d.State] = +d.LE; });

  const color = d3.scaleSequential()
                  .domain(d3.extent(csvData, d => +d.LE))
                  .interpolator(d3.interpolateBlues);

  // ----- GRATICULE -----
  var graticule = d3.geoGraticule().step([5,5]); // every 5°

  // graticule background
  svg.append("path")
      .datum(graticule.outline())
      .attr("class","gratBackground")
      .attr("d", path);

  // graticule lines
  svg.selectAll(".gratLines")
      .data(graticule.lines())
      .enter()
      .append("path")
      .attr("class","gratLines")
      .attr("d", path);

  // ----- STATES -----
  svg.selectAll("path.state")
    .data(states)
    .enter()
    .append("path")
      .attr("class", "state")
      .attr("d", path)
      .attr("fill", d => dataMap[d.properties.name] ? color(dataMap[d.properties.name]) : "#ccc")
      .on("mouseover", (event,d) => {
          const val = dataMap[d.properties.name];
          tooltip.style("display","block")
                 .html(`<strong>${d.properties.name}</strong><br>Life Expectancy: ${val || "N/A"}`);
      })
      .on("mousemove", event => {
          tooltip.style("left",(event.pageX+10)+"px")
                 .style("top",(event.pageY-20)+"px");
      })
      .on("mouseout", ()=>tooltip.style("display","none"));

  // ----- LEGEND -----
  const legendWidth = 300;
  const legendHeight = 10;
  const legendData = d3.range(d3.min(csvData,d=>+d.LE), d3.max(csvData,d=>+d.LE), 0.5);

  const legend = svg.append("g")
                    .attr("class","legend")
                    .attr("transform", `translate(${(width-legendWidth)/2},${height+30})`);

  legend.selectAll("rect")
        .data(legendData)
        .enter()
        .append("rect")
          .attr("x",(d,i)=> i*(legendWidth/legendData.length))
          .attr("width", legendWidth/legendData.length)
          .attr("height", legendHeight)
          .attr("fill", d=>color(d));

  legend.append("text")
        .attr("x",0).attr("y",legendHeight+15)
        .text(Math.round(d3.min(csvData,d=>+d.LE)));
  legend.append("text")
        .attr("x",legendWidth).attr("y",legendHeight+15)
        .attr("text-anchor","end")
        .text(Math.round(d3.max(csvData,d=>+d.LE)));

}).catch(error => console.error("Error loading data:", error));
</script>

</body>
</html>
