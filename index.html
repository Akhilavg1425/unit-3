<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>US Life Expectancy Map + Bar Chart</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson@3"></script>

<style>
body {
  font-family: Arial, sans-serif;
}

svg {
  background-color: #f9f9f9;
}

.state {
  stroke: #ffffff;
  stroke-width: 1;
}

.bar:hover {
  fill: orange;
}

.tooltip {
  position: absolute;
  background: white;
  padding: 6px;
  border: 1px solid #ccc;
  font-size: 12px;
  pointer-events: none;
  display: none;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Life Expectancy Visualization-United States of America</h2>

<svg></svg>
<div class="tooltip"></div>

<script>

//  SETUP 
const totalWidth = 1200;
const totalHeight = 600;

const mapWidth = 700;
const chartWidth = 450;
const height = 600;

const svg = d3.select("svg")
  .attr("width", totalWidth)
  .attr("height", totalHeight);

const mapGroup = svg.append("g");
const chartGroup = svg.append("g")
  .attr("transform", `translate(${mapWidth + 40}, 50)`);

const tooltip = d3.select(".tooltip");

//  MAP 
const projection = d3.geoAlbersUsa()
  .translate([mapWidth / 2, height / 2])
  .scale(900);

const path = d3.geoPath().projection(projection);

//  LOAD DATA 
Promise.all([
  d3.csv("data/life_expectancy.csv"),
  d3.json("data/us-states.topojson")
]).then(([csvData, usTopo]) => {

  const states = topojson.feature(usTopo, usTopo.objects["us-states"]).features;

  const dataMap = {};
  csvData.forEach(d => {
    dataMap[d.State] = +d.LE;
  });

  const color = d3.scaleSequential()
    .domain(d3.extent(csvData, d => +d.LE))
    .interpolator(d3.interpolateBlues);

  //  DRAW MAP 
  mapGroup.selectAll("path")
    .data(states)
    .enter()
    .append("path")
    .attr("class", "state")
    .attr("d", path)
    .attr("fill", d => dataMap[d.properties.name] ? color(dataMap[d.properties.name]) : "#ccc")
    .on("mouseover", (event,d) => {
      const val = dataMap[d.properties.name];
      tooltip.style("display","block")
        .html(`<strong>${d.properties.name}</strong><br>LE: ${val}`);
    })
    .on("mousemove", event => {
      tooltip.style("left",(event.pageX+10)+"px")
             .style("top",(event.pageY-20)+"px");
    })
    .on("mouseout", ()=> tooltip.style("display","none"));

  //  BAR CHART 
  csvData.sort((a,b) => d3.descending(+a.LE, +b.LE));

  const x = d3.scaleBand()
    .domain(csvData.map(d => d.State))
    .range([0, chartWidth])
    .padding(0.2);

  const y = d3.scaleLinear()
    .domain([70, d3.max(csvData, d => +d.LE)])
    .range([400, 0]);

  // bars
  chartGroup.selectAll(".bar")
    .data(csvData)
    .enter()
    .append("rect")
    .attr("class", "bar")
    .attr("x", d => x(d.State))
    .attr("y", d => y(+d.LE))
    .attr("width", x.bandwidth())
    .attr("height", d => 400 - y(+d.LE))
    .attr("fill", "#69b3a2")
    .on("mouseover", (event,d) => {
      tooltip.style("display","block")
        .html(`<strong>${d.State}</strong><br>LE: ${d.LE}`);
    })
    .on("mousemove", event => {
      tooltip.style("left",(event.pageX+10)+"px")
             .style("top",(event.pageY-20)+"px");
    })
    .on("mouseout", ()=> tooltip.style("display","none"));

  // X axis
  chartGroup.append("g")
    .attr("transform", "translate(0,400)")
    .call(d3.axisBottom(x)
      .tickValues(x.domain().filter((d,i)=> !(i%5))))
    .selectAll("text")
    .attr("transform","rotate(-45)")
    .style("text-anchor","end");

  // Y axis
  chartGroup.append("g")
    .call(d3.axisLeft(y));

  // Title
  chartGroup.append("text")
    .attr("x", chartWidth/2)
    .attr("y", -10)
    .attr("text-anchor","middle")
    .style("font-size","16px")
    .text("Life Expectancy by State");

}).catch(error => console.error(error));

</script>

</body>
</html>
